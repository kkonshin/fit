services:
    # PHP Service
    app:
        build:
            context: .
            dockerfile: docker/app/Dockerfile
            args:
                PGID: "${PGID:-1000}"
                PUID: "${PUID:-1000}"
        image: ${COMPOSE_PROJECT_NAME}/app
        container_name: "${APP_NAME}-app"
        restart: unless-stopped
        tty: true
        working_dir: /var/www/
        volumes:
            - ./:/var/www/
        depends_on:
            - db
            - redis
        networks:
            - fit-network
        environment:
            PHP_IDE_CONFIG: "serverName=${APP_NAME}"
        extra_hosts:
            - 'host.docker.internal:host-gateway'

    # Nginx Service
    webserver:
        image: nginx:stable-alpine
        container_name: "${APP_NAME}-nginx"
        restart: unless-stopped
        tty: true
        ports:
            - "127.0.0.1:${APP_PORT}:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
        networks:
            - fit-network

    # PostgresSQL Service
    db:
        image: postgres:17-alpine
        container_name: "${APP_NAME}-postgres"
        restart: unless-stopped
        tty: true
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - fit-postgres-data:/var/lib/postgresql/data
        networks:
            - fit-network

    # Node/NPM Service
    node:
        build:
            context: .
            dockerfile: docker/app/Dockerfile
            args:
                PGID: "${PGID:-1000}"
                PUID: "${PUID:-1000}"
        image: ${COMPOSE_PROJECT_NAME}/app
        container_name: "${APP_NAME}-node"
        volumes:
            - ./:/var/www
        working_dir: /var/www
        entrypoint: ['npm']
        networks:
            - fit-network

    # Redis Service
    redis:
        image: redis:alpine
        container_name: "${APP_NAME}-redis"
        ports:
            - "6379:6379"
        networks:
            - fit-network

    # Memcached Container
    memcached:
        image: memcached:latest
        container_name: "${APP_NAME}-memcached"
        networks:
            - fit-network

volumes:
    fit-postgres-data:
        driver: local

networks:
    fit-network:
        driver: bridge
